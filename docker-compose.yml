services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: events
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d events"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      POSTGRES_DSN: postgresql://app:app@postgres:5432/events
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
    command: python -m app.worker
    environment:
      POSTGRES_DSN: postgresql://app:app@postgres:5432/events
      REDIS_URL: redis://redis:6379/0
      FX_API_URL: https://api.frankfurter.app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
